name: Central OpenCode Agent

on:
  workflow_call:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Check for Develop Branch
        id: branch-check
        run: |
          set -euo pipefail

          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/branches/develop" || echo "0")

          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "TARGET_BRANCH=develop" >> "$GITHUB_ENV"
            echo "Branch found! Targeting: develop"
          else
            echo "TARGET_BRANCH=main" >> "$GITHUB_ENV"
            echo "Branch not found or API failed! Falling back to: main"
          fi

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Detect Model Alias from Comment
        id: model-selector
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          # Default fallback model if no alias is found
          SELECTED_MODEL="opencode/deepseek-v4-flash-free"

          # Match aliases safely from env var (multiline-safe)
          if [[ "$COMMENT_BODY" == *"@gemini"* ]]; then
            SELECTED_MODEL="google/gemini-2.5-pro"
          elif [[ "$COMMENT_BODY" == *"@flash"* ]]; then
            SELECTED_MODEL="google/gemini-2.5-flash"
          elif [[ "$COMMENT_BODY" == *"@router"* ]]; then
            SELECTED_MODEL="openrouter/google/gemini-2.5-flash"
          elif [[ "$COMMENT_BODY" == *"@coder"* ]]; then
            SELECTED_MODEL="openrouter/qwen/qwen-2.5-coder-32b"
          fi

          echo "chosen_model=$SELECTED_MODEL" >> "$GITHUB_OUTPUT"

      - name: Run opencode
        id: run-opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ steps.model-selector.outputs.chosen_model }}
          base_branch: ${{ env.TARGET_BRANCH }}
          # Alias in case this action version reads `base` instead of
          # `base_branch` internally. Harmless if the action ignores it.
          base: ${{ env.TARGET_BRANCH }}

      # SAFETY NET: force-correct the PR's base branch regardless of what
      # the action actually did with the inputs above. Verify against
      # anomalyco/opencode's action.yml whether it exposes a PR number
      # output — if it does, swap the heuristic below for that instead
      # of "most recent open PR" to avoid any race with concurrent runs.
      - name: Force-correct PR base branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Give the API a moment to register the PR the action just opened
          sleep 5

          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,baseRefName,createdAt \
            --jq "sort_by(.createdAt) | reverse | .[0].number" || echo "")

          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            CURRENT_BASE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json baseRefName --jq .baseRefName)
            if [ "$CURRENT_BASE" != "$TARGET_BRANCH" ]; then
              echo "PR #$PR_NUMBER opened against '$CURRENT_BASE' — correcting to '$TARGET_BRANCH'"
              gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --base "$TARGET_BRANCH"
            else
              echo "PR #$PR_NUMBER already targets '$TARGET_BRANCH' — no action needed"
            fi
          else
            echo "No open PR found to correct — skipping"
          fi